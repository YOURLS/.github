# https://docs.github.com/actions

name: Lint

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      exclude:
        required: false
        default: ""
        type: string
        description: Regex filter of path to exclude
      fix:
        required: false
        default: false
        type: boolean
        description: Fix linting and formatting issues

permissions:
  contents: write
  packages: read
  statuses: write

jobs:
  super-linter:
    name: Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint Code Base
        uses: super-linter/super-linter/slim@v8.6.0
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ github.token }}
          FILTER_REGEX_EXCLUDE: ${{ inputs.exclude }}
          VALIDATE_JSCPD: false
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          # < Use PYTHON_RUFF_FORMAT
          VALIDATE_PYTHON_BLACK: false
          # >
          # < Use BIOME_LINT
          VALIDATE_CSS: false
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_JSON: false
          VALIDATE_JSONC: false
          VALIDATE_JSX: false
          VALIDATE_TSX: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_VUE: false
          FIX_BIOME_LINT: ${{ inputs.fix }}
          # >
          # < Use BIOME_FORMAT
          # VALIDATE_CSS_PRETTIER: false
          # VALIDATE_GRAPHQL_PRETTIER: false
          # VALIDATE_HTML_PRETTIER: false
          # VALIDATE_JAVASCRIPT_PRETTIER: false
          # VALIDATE_JSON_PRETTIER: false
          # VALIDATE_JSONC_PRETTIER: false
          # VALIDATE_JSX_PRETTIER: false
          # VALIDATE_MARKDOWN_PRETTIER: false
          # VALIDATE_TYPESCRIPT_PRETTIER: false
          # VALIDATE_VUE_PRETTIER: false
          # VALIDATE_YAML_PRETTIER: false
          # FIX_BIOME_FORMAT: ${{ inputs.fix }}
          VALIDATE_BIOME_FORMAT: false
          FIX_CSS_PRETTIER: ${{ inputs.fix }}
          FIX_GRAPHQL_PRETTIER: ${{ inputs.fix }}
          FIX_HTML_PRETTIER: ${{ inputs.fix }}
          FIX_JAVASCRIPT_PRETTIER: ${{ inputs.fix }}
          FIX_JSON_PRETTIER: ${{ inputs.fix }}
          FIX_JSONC_PRETTIER: ${{ inputs.fix }}
          FIX_JSX_PRETTIER: ${{ inputs.fix }}
          FIX_MARKDOWN_PRETTIER: ${{ inputs.fix }}
          FIX_TYPESCRIPT_PRETTIER: ${{ inputs.fix }}
          FIX_YAML_PRETTIER: ${{ inputs.fix }}
          # >
          FIX_MARKDOWN: ${{ inputs.fix }}
          FIX_NATURAL_LANGUAGE: ${{ inputs.fix }}

      - name: Commit and push linting fixes
        if: >
          github.event_name == 'pull_request' &&
          github.ref_name != github.event.repository.default_branch
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref }}
          commit_message: "Fix linting issues"
