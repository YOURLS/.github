# https://docs.github.com/actions

name: Lint

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      exclude:
        required: false
        default: ""
        type: string
        description: Regex filter of path to exclude
      fix:
        required: false
        default: false
        type: boolean
        description: Fix linting and formatting issues

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  super-linter:
    name: Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint Code Base
        uses: super-linter/super-linter/slim@v8.6.0
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ github.token }}
          FILTER_REGEX_EXCLUDE: ${{ inputs.exclude }}
          VALIDATE_JSCPD: false
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          FIX_CSS: ${{ inputs.fix }}
          FIX_JSON: ${{ inputs.fix }}
          FIX_JSONC: ${{ inputs.fix }}
          FIX_MARKDOWN: ${{ inputs.fix }}
          FIX_NATURAL_LANGUAGE: ${{ inputs.fix }}
          FIX_TSX: ${{ inputs.fix }}
          FIX_JAVASCRIPT_PRETTIER: ${{ inputs.fix }}
          FIX_TYPESCRIPT_PRETTIER: ${{ inputs.fix }}
          FIX_YAML_PRETTIER: ${{ inputs.fix }}
